<!DOCTYPE html>
<html>
    <head>
        <title>Archery timer control panel</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
        <link rel="stylesheet" type="text/css" href="/css/ctrlpanel.css">
        <script type="text/javascript" src="/js/core/namespace.js"></script>
        <script type="text/javascript" src="/js/ui/ctrlpanel.js" defer></script>
    </head>
    <body data-ui="ctrlpanel">
        <table>
            <tbody>
                <tr>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="10" data-i18n="misc.seconds_short" data-i18n-seconds="10"></button></td>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="20" data-i18n="misc.seconds_short" data-i18n-seconds="20"></button></td>
                    <td class="w50" colspan="3"><button id="ctrlStart" type="button" class="start-btn" data-action="run-primary" data-i18n="controls.primary.start"></button></td>
                </tr>
                <tr>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="40" data-i18n="misc.seconds_short" data-i18n-seconds="40"></button></td>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="60" data-i18n="misc.seconds_short" data-i18n-seconds="60"></button></td>
                    <td class="w50" colspan="3"><button id="ctrlStop" type="button" class="stop-btn" data-action="cease-fire" data-i18n="controls.emergency_stop"></button></td>
                </tr>
                <tr>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="80" data-i18n="misc.seconds_short" data-i18n-seconds="80"></button></td>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="120" data-i18n="misc.seconds_short" data-i18n-seconds="120"></button></td>
                    <td class="abcd"><button type="button" data-action="set-abcd-mode" data-mode="ab">AB</button></td>
                    <td class="abcd"><button type="button" data-action="set-abcd-mode" data-mode="cd">CD</button></td>
                    <td class="abcd"><button type="button" data-action="set-abcd-mode" data-mode="all" data-i18n="misc.all"></button></td>
                </tr>
                <tr>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="160" data-i18n="misc.seconds_short" data-i18n-seconds="160"></button></td>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="180" data-i18n="misc.seconds_short" data-i18n-seconds="180"></button></td>
                    <td class="w50" colspan="3"><button type="button" data-action="toggle-decimal" class="tctrl" data-i18n="misc.toggle_tenths"></button></td>
                </tr>
                <tr>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="200" data-i18n="misc.seconds_short" data-i18n-seconds="200"></button></td>
                    <td><button type="button" data-action="set-round-seconds" data-seconds="240" data-i18n="misc.seconds_short" data-i18n-seconds="240"></button></td>
                    <td class="w50" colspan="3"><button type="button" data-action="toggle-controls" class="tctrl" data-i18n="misc.toggle_main_controls"></button></td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
